  <!-- 5. Calendar @ (50,70) s=0.9 r=5 -->
  <g transform="translate(50 70) scale(0.9) rotate(5 12 12)">
    <path d="M8 2v4"/>
    <path d="M16 2v4"/>
    <rect width="18" height="18" x="3" y="4" rx="2"/>
    <path d="M3 10h18"/>
