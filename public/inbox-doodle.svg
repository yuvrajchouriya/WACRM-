    <circle cx="17.5" cy="17.5" r="2.5"/>
  </g>

  <!-- 17. ShoppingCart @ (152,205) s=0.8 r=5 -->
  <g transform="translate(152 205) scale(0.8) rotate(5 12 12)">
    <circle cx="8" cy="21" r="1"/>
    <circle cx="19" cy="21" r="1"/>
